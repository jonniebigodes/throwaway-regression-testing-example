name: "Chromatic with Action"

on: push
#################################### NON SHARDED WORKFLOW ################################
jobs:
  vitest:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
      - name: Install dependencies
        # ⚠️ See your package manager's documentation for the correct command to install dependencies in a CI environment.
        run: npm ci
      - name: Run Vitest tests
        #run: npx vitest run
        # runs custom command to allow only the tests that are relevant for Chromatic to run, and to output results in a format that Chromatic can consume.
        run: npx vitest run --project chromatic
        env:
          HOME: /root
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          # Chromatic automatically defaults to the test-results directory.
          # Replace with the path to your custom directory and adjust the CHROMATIC_ARCHIVE_LOCATION environment variable accordingly.
          name: test-results-action
          path: .vitest/chromatic
          retention-days: 1
  chromatic:
    name: Run Chromatic
    needs: vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
      - name: Install dependencies
        # ⚠️ See your package manager's documentation for the correct command to install dependencies in a CI environment.
        run: npm ci
      - name: Download Vitest test results
        uses: actions/download-artifact@v8
        with:
          name: test-results-action
          path: .vitest/chromatic
      - name: Run Chromatic tests
        uses: chromaui/action@latest
        with:
          vitest: true
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
